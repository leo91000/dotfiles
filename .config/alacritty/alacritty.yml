colors:
  # Default colors
  bright:
    black:   '0x414868'
    blue:    '0x7aa2f7'
    cyan:    '0x7dcfff'
    green:   '0x9ece6a'
    magenta: '0xbb9af7'
    red:     '0xf7768e'
    white:   '0xc0caf5'
    yellow:  '0xe0af68'

  # Normal colors
  normal:
    black:   '0x1d202f'
    blue:    '0x7aa2f7'
    cyan:    '0x7dcfff'
    green:   '0x9ece6a'
    magenta: '0xbb9af7'
    red:     '0xf7768e'
    white:   '0xa9b1d6'
    yellow:  '0xe0af68'

  # Bright colors
  primary:
    background: '0x24283b'
    foreground: '0xc0caf5'

font:
  bold:
    family: MesloLGS NF
    style: Bold
  normal:
    family: MesloLGS NF
  offset:
    x: 0
    y: 2
  size: 15.0

key_bindings:
  - { chars: "\\fg" , key: F, mods: Control|Shift}
  - { chars: "\\ff" , key: N, mods: Control|Shift}
  - { action: ToggleFullscreen , key: F11, mods: Alt}
  - { action: ToggleViMode , key: Space, mods: Alt|Control}
  - { chars: "\x02\"" , key: H, mods: Control|Shift}
  - { chars: "\x02%" , key: Y, mods: Control|Shift}
  - { chars: "\x02n" , key: K, mods: Control|Shift}
  - { chars: "\x02p" , key: J, mods: Control|Shift}
  - { chars: "\x02c" , key: T, mods: Control|Shift}
  - { chars: "\x02x" , key: W, mods: Control|Shift}

window:
  opacity: 0.95
